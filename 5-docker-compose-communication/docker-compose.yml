services:
  web:
    build: .
    image: my-flask-app:latest
    ports:
      - "4000:4000"
    environment:
      - FLASK_ENV=production
    networks:
      - frontend
      - backend

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
